<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LifeSync Dashboard</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="overlay"></div>

  <section id="loginPage" class="login-page active">
    <form id="loginForm" class="login-card">
      <h1>LifeSync Login</h1>
      <input id="email" type="email" placeholder="Email" required>
      <input id="password" type="password" placeholder="Password" required>
      <button type="submit" class="btn">Login</button>
      <p id="loginError"></p>
    </form>
  </section>

  <div id="appShell" class="app-shell">
    <aside id="sidebar" class="sidebar">
      <button id="collapseSidebarBtn" type="button">Collapse</button>
      <nav>
        <button class="nav-link active" data-page="dashboardPage" type="button">Dashboard</button>
        <button class="nav-link" data-page="expensesPage" type="button">Expenses</button>
        <button class="nav-link" data-page="tasksPage" type="button">Tasks</button>
        <button class="nav-link" data-page="groceryPage" type="button">Grocery</button>
        <button class="nav-link" data-page="medicinesPage" type="button">Medicines</button>
      </nav>
      <button id="logoutBtn" type="button" class="btn btn-danger">Logout</button>
    </aside>

    <main>
      <header>
        <button id="mobileMenuBtn" type="button">Menu</button>
        <h1 id="pageTitle">dashboard</h1>
      </header>

      <section id="dashboardPage" class="page active">
        <button type="button" data-page-link="expensesPage">Go Expenses</button>
        <button type="button" data-page-link="tasksPage">Go Tasks</button>
        <button type="button" data-page-link="groceryPage">Go Grocery</button>
        <button type="button" data-page-link="medicinesPage">Go Medicines</button>
        <p id="dashboardExpenseCount"></p>
        <p id="dashboardTaskCount"></p>
        <p id="dashboardGroceryCount"></p>
        <p id="dashboardMedicineCount"></p>
      </section>

      <section id="expensesPage" class="page">
        <button id="openExpenseModalBtn" type="button">Add Expense</button>
        <table>
          <tbody id="expenseTableBody"></tbody>
        </table>
      </section>

      <section id="tasksPage" class="page">
        <button id="openTaskModalBtn" type="button">Add Task</button>
        <div id="taskList"></div>
      </section>

      <section id="groceryPage" class="page">
        <button id="openGroceryModalBtn" type="button">Add Grocery</button>
        <div id="groceryList"></div>
      </section>

      <section id="medicinesPage" class="page">
        <button id="openMedicineModalBtn" type="button">Add Medicine</button>
        <div id="medicineList"></div>
      </section>
    </main>
  </div>

  <div id="expenseModal" class="modal">
    <div>
      <button class="close-modal" data-close="expenseModal" type="button">x</button>
      <form id="expenseForm">
        <input id="expenseTitle" placeholder="Title" required>
        <input id="expenseCategory" placeholder="Category">
        <input id="expenseAmount" type="number" step="0.01" placeholder="Amount" required>
        <input id="expenseDate" type="date" required>
        <button type="submit">Save</button>
      </form>
    </div>
  </div>

  <div id="taskModal" class="modal">
    <div>
      <button class="close-modal" data-close="taskModal" type="button">x</button>
      <form id="taskForm">
        <input id="taskTitle" placeholder="Task title" required>
        <button type="submit">Save</button>
      </form>
    </div>
  </div>

  <div id="groceryModal" class="modal">
    <div>
      <button class="close-modal" data-close="groceryModal" type="button">x</button>
      <form id="groceryForm">
        <input id="groceryTitle" placeholder="Item name" required>
        <button type="submit">Save</button>
      </form>
    </div>
  </div>

  <div id="medicineModal" class="modal">
    <div>
      <button class="close-modal" data-close="medicineModal" type="button">x</button>
      <form id="medicineForm">
        <input id="medicineTitle" placeholder="Medicine name" required>
        <input id="medicineTime" placeholder="Reminder time" required>
        <button type="submit">Save</button>
      </form>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
